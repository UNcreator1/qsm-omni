name: QSM Production QA

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
  workflow_dispatch:

jobs:
  production-qa:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      QSM_ALLOW_LOCAL_RELEASE_EVIDENCE: "0"
      QSM_SANDBOX_DOCKER_IMAGE: qsm-omni-sandbox:local
      QSM_SHARED_CACHE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build QSM
        run: |
          go test ./...
          go build -o qsm ./cmd/qsm
      - name: Build omni sandbox image
        run: docker build -t qsm-omni-sandbox:local -f deploy/qsm-omni-sandbox.Dockerfile .
      - name: Probe sandbox
        run: ./qsm sandbox -probe -backend docker -image qsm-omni-sandbox:local -profile omni
      - name: Stress and recovery evidence
        run: |
          ./qsm stress -sandbox docker -nodes 12 -parallel 6 -large-repo-files 1000
          ./qsm recovery -sandbox docker
          ./qsm contributor-smoke
      - name: Run omni benchmark
        run: ./qsm benchmark -suite omni-contract -sandbox docker -image qsm-omni-sandbox:local -positions 2 -parallel 2
      - name: Run self improvement
        run: |
          ./qsm self-improve -suite omni-contract -cycles 3 -sandbox docker -image qsm-omni-sandbox:local || {
            python3 - <<'PY' || true
            import json
            from pathlib import Path

            def esc(value):
                value = str(value or "")
                return value.replace("%", "%25").replace("\n", "%0A").replace("\r", "%0D").replace(":", "%3A").replace(",", "%2C")

            path = Path(".state/self_improvement_report.json")
            if path.exists():
                report = json.loads(path.read_text())
                for err in report.get("errors", []):
                    print(f"::error title=QSM self-improve gate::{esc(err)}")
                for cycle in report.get("task_summaries", []):
                    cycle_id = cycle.get("cycle")
                    for task in cycle.get("tasks", []):
                        if task.get("passed"):
                            continue
                        msg = (
                            f"cycle={cycle_id} task={task.get('name')} exit={task.get('exit_code')} "
                            f"nodes={task.get('succeeded_nodes')}/{task.get('succeeded_nodes', 0) + task.get('failed_nodes', 0)} "
                            f"collapse={task.get('collapse_approved')} trace={task.get('trace_passed')} "
                            f"manifest={task.get('manifest_passed')} cachewiki={task.get('lake_cache_citation_coverage')} "
                            f"force={task.get('force_average')} error={task.get('error')}"
                        )
                        print(f"::error title=QSM failed {esc(task.get('name'))}::{esc(msg)}")
            else:
                print("::error title=QSM self-improve report missing::.state/self_improvement_report.json was not created")
            PY
            echo "::group::self_improvement_report"
            cat .state/self_improvement_report.md || true
            echo "::endgroup::"
            echo "::group::cycle benchmark reports"
            find .benchmarks -path '*/.state/benchmark_report.json' -print -exec cat {} \; || true
            echo "::endgroup::"
            exit 1
          }
      - name: Local evidence reports
        run: |
          ./qsm production-gap || true
          ./qsm ops-readiness
          ./qsm compliance
      - name: Production QA
        run: ./qsm qa -profile production -sandbox docker -image qsm-omni-sandbox:local -refresh=true
      - name: Omni alpha QA advisory
        continue-on-error: true
        run: ./qsm qa -profile omni-alpha -sandbox docker -image qsm-omni-sandbox:local -refresh=true
      - name: Upload QSM evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qsm-production-evidence
          include-hidden-files: true
          path: |
            .state/**
            .benchmarks/**
          retention-days: 14
